name: Affected Tests (advisory)

# Advisory job: prints the affected-tests filter for the current PR. Uses the
# same compute-affected-tests.mts CLI that livetest-on-pr.yml uses, so there's
# a single source of truth.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  affected-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute affected tests
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          LOG_LEVEL: error
        run: |
          set -e
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" > /tmp/changed.txt
          printf '%s' "$PR_BODY" > /tmp/body.md

          npx tsx backend/tests/livetests/src/compute-affected-tests.mts \
            --diff /tmp/changed.txt \
            --pr-body /tmp/body.md \
            --out /tmp/result.json \
            --summary-out /tmp/compute-summary.md

          cat /tmp/compute-summary.md >> "$GITHUB_STEP_SUMMARY"

          SKIP=$(jq -r '.skip' /tmp/result.json)
          FILTER=$(jq -r '.filter' /tmp/result.json)
          if [ "$SKIP" = "true" ]; then
            echo "::notice::No livetests would run for this PR"
          else
            echo "::notice::Livetest filter: $FILTER"
            echo ""
            echo "To run locally:"
            echo "  npx tsx backend/tests/livetests/src/live-test-runner.mts <instance> '$FILTER'"
          fi

          jq -r '.warnings[]?' /tmp/result.json | sed 's/^/::warning::/' || true
