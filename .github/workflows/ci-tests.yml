name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        type: string

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Check if relevant code changed (skip CI for docs-only etc.)
  # ============================================================

  check-changes:
    name: Check for code changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'backend/**'
              - 'frontend/**'
              - 'e2e/**'
              - 'json/**'
              - 'scripts/**'
              - 'install-oci-lxc-deployer.sh'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.nvmrc'
              - '.github/workflows/ci-tests.yml'

  # ============================================================
  # Wake PVE host and ensure test-worker is reachable
  # All infrastructure details live in the runner's environment,
  # not in this workflow. See: pvetest --help
  # ============================================================

  wake-backend:
    needs: [check-changes]
    if: needs.check-changes.outputs.code == 'true'
    runs-on: [self-hosted, linux, pve1]
    timeout-minutes: 10
    steps:
      - name: Wake backend and wait for test-worker
        run: pvetest wake

  # ============================================================
  # All tests run via pvetest on a remote test-worker.
  # The runner on pve1 is just a relay.
  # ============================================================

  unit-tests:
    needs: [wake-backend]
    runs-on: [self-hosted, linux, pve1]
    timeout-minutes: 20
    steps:
      - name: Checkout on test-worker
        run: pvetest checkout ${{ github.sha }} https://github.com/${{ github.repository }}.git

      - name: Install dependencies
        run: pvetest exec pnpm install --frozen-lockfile

      - name: Code quality (jscpd)
        run: pvetest exec "pnpm dupcheck"

      - name: Frontend tests
        run: pvetest exec "cd frontend && CI=true pnpm test"

      - name: Backend tests
        run: pvetest exec "cd backend && CI=true pnpm test:all"

      - name: Fetch coverage
        if: always()
        run: pvetest fetch backend/coverage/ /tmp/coverage/ || true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: /tmp/coverage/
          retention-days: 7

  template-tests:
    needs: [install-test]
    runs-on: [self-hosted, linux, pve1]
    timeout-minutes: 30
    steps:
      - name: Checkout on test-worker
        run: pvetest checkout ${{ github.sha }} https://github.com/${{ github.repository }}.git

      - name: Install dependencies
        run: pvetest exec "cd backend && pnpm install --frozen-lockfile"

      - name: Template tests
        run: pvetest exec "cd backend && CI=true E2E_INSTANCE=github-action pnpm test:templates"

  install-test:
    needs: [wake-backend]
    runs-on: [self-hosted, linux, pve1]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Rollback to baseline
        run: pvetest snapshot-rollback baseline

      - name: Install deployer
        run: ./e2e/step2-install-deployer.sh github-action

  e2e-tests:
    needs: [install-test]
    runs-on: [self-hosted, linux, pve1]
    timeout-minutes: 45
    steps:
      - name: Checkout on test-worker
        run: pvetest checkout ${{ github.sha }} https://github.com/${{ github.repository }}.git

      - name: Install and build
        run: |
          pvetest exec pnpm install --frozen-lockfile
          pvetest exec pnpm exec playwright install chromium
          pvetest exec pnpm run build

      - name: Clean test containers
        run: pvetest exec "./e2e/clean-test-containers.sh github-action" || true

      - name: Playwright E2E tests
        run: pvetest exec "CI=true E2E_INSTANCE=github-action pnpm exec playwright test --project=nested-vm"

      - name: Fetch Playwright report
        if: always()
        run: pvetest fetch e2e/test-results/ /tmp/playwright-report/ || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: /tmp/playwright-report/
          retention-days: 7

  # ============================================================
  # Live integration tests — parallel queue workers
  # Creates real LXC containers on PVE host.
  # Uses ZFS snapshot/rollback for clean state.
  # ============================================================

  live-test-init:
    needs: [install-test]
    runs-on: [self-hosted, linux, pve1]
    timeout-minutes: 10
    steps:
      - name: Create ZFS snapshot for live tests
        run: pvetest snapshot-create live-test

      - name: Initialize test queue
        run: |
          pvetest exec "curl -s -X POST http://localhost:3000/api/test-queue/init -H 'Content-Type: application/json' -d '{}'"

  live-test-worker:
    needs: [live-test-init]
    runs-on: [self-hosted, linux, pve1]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        worker: [1, 2]
    steps:
      - name: Checkout on test-worker
        run: pvetest checkout ${{ github.sha }} https://github.com/${{ github.repository }}.git

      - name: Install dependencies
        run: pvetest exec "cd backend && pnpm install --frozen-lockfile"

      - name: Run queue worker ${{ matrix.worker }}
        run: pvetest exec "npx tsx backend/tests/livetests/src/live-test-runner.mts github-action --queue"

  live-test-finish:
    needs: [live-test-worker]
    if: always()
    runs-on: [self-hosted, linux, pve1]
    timeout-minutes: 15
    steps:
      - name: Collect queue results
        run: pvetest exec "curl -s http://localhost:3000/api/test-queue/status" || true

      - name: Rollback ZFS snapshot
        run: pvetest snapshot-rollback live-test

      - name: Reinstall deployer
        run: ./e2e/step2-install-deployer.sh github-action
