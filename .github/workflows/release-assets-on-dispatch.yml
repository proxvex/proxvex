name: "On dispatch: Release assets"

on:
  workflow_call:
    inputs:
      version:
        description: 'Explicit semver, e.g. 0.5.32. Must not match an existing v-tag.'
        required: true
        type: string
      skip_github_release:
        description: 'Skip GitHub Release creation (used when Release Please already created it).'
        required: false
        type: boolean
        default: false
    outputs:
      resolved_version:
        description: 'Resolved version used for tagging.'
        value: ${{ jobs.build-and-release.outputs.resolved_version }}
      image_tag:
        description: 'Docker image tag (v<version>).'
        value: v${{ jobs.build-and-release.outputs.resolved_version }}
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit semver, e.g. 0.5.32. Must not match an existing v-tag.'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  product_name: proxvex
  main_docker_name: 'ghcr.io/${{ github.repository_owner }}/proxvex'

jobs:
  build-and-release:
    name: "Build and push Docker image"
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      packages: write
    outputs:
      resolved_version: ${{ steps.setver.outputs.resolved_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_PUSH_MAIN }}
      - name: Validate and set version
        id: setver
        run: |
          set -euo pipefail
          input_version="${{ inputs.version }}"

          # 1. Strict semver format — no bump keywords, no partial versions
          if ! echo "$input_version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be exact semver X.Y.Z, got: '$input_version'"
            exit 1
          fi

          # 2. Show reference + reject duplicate tags before any state change
          git fetch --tags --prune --force
          highest="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -1 | sed 's/^v//')"
          echo "Highest existing v-tag: ${highest:-<none>}"
          echo "Requested version:      $input_version"
          if git rev-parse -q --verify "refs/tags/v$input_version" >/dev/null; then
            echo "::error::Tag v$input_version already exists. Pick a higher version."
            exit 1
          fi

          # 3. Bump package.json + release-please manifest, commit, push.
          #    The [skip version-check] marker keeps preserve-version-on-push.yml
          #    from reverting this commit.
          git config --global user.email "noreply@github.com"
          git config --global user.name  "Workflow User"
          npm version "$input_version" --no-git-tag-version --allow-same-version
          printf '{".": "%s"}\n' "$input_version" > .release-please-manifest.json
          git add package.json .release-please-manifest.json
          git commit -m "$input_version [skip version-check]"
          git push

          echo "resolved_version=$input_version" >> $GITHUB_OUTPUT
          echo "Using version: $input_version"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies and build
        run: |
          pnpm install --frozen-lockfile
          (cd frontend && pnpm install --frozen-lockfile)
          pnpm run build

      - name: Create npm pack tarball
        run: |
          npm pack --pack-destination docker/
          mv docker/proxvex-*.tgz docker/proxvex.tgz
          echo "Tarball size: $(du -h docker/proxvex.tgz | cut -f1)"

      - name: Read Node.js major version from .nvmrc
        id: nodeversion
        run: echo "major=$(cut -d. -f1 .nvmrc)" >> $GITHUB_OUTPUT

      - name: Setup QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: .
          file: docker/Dockerfile.npm-pack
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.main_docker_name }}:${{ steps.setver.outputs.resolved_version }}
            ${{ env.main_docker_name }}:latest
          build-args: |
            NODE_MAJOR=${{ steps.nodeversion.outputs.major }}
            BUILD_VERSION=${{ steps.setver.outputs.resolved_version }}
            BUILD_REF=${{ github.sha }}
            BUILD_DATE=${{ github.run_started_at }}
            BUILD_REPOSITORY=${{ github.repository }}

      - name: Create GitHub Release
        if: ${{ !inputs.skip_github_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.setver.outputs.resolved_version }}
          generate_release_notes: true
          body: |
            ## Docker Image

            ```bash
            docker pull ${{ env.main_docker_name }}:${{ steps.setver.outputs.resolved_version }}
            ```

            **Multi-architecture support:** `linux/amd64`, `linux/arm64`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
