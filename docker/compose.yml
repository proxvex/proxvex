services:
  proxvex:
    # We use a mariadb image which supports both amd64 & arm64 architecture
    image: proxvex.latest:latest
    container_name: proxvex
    ports:
      - 3080:3080
      - 3443:3443
    restart: always
    volumes:
      - data:/home/volkmar/data
      - config:/home/volkmar/config
      - ssl:/home/volkmar/ssl
    environment:
      - TZ=Europe/Berlin
volumes:
  data:
  config:
  ssl: