services:
  gitea:
    image: gitea/gitea:${GITEA_VERSION:-latest}
    restart: unless-stopped
    environment:
      USER_UID: ${UID:-1000}
      USER_GID: ${GID:-1000}
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: "{{ POSTGRES_HOST }}:5432"
      GITEA__database__NAME: gitea
      GITEA__database__USER: postgres
      GITEA__database__PASSWD: "{{ POSTGRES_PASSWORD }}"
      GITEA__database__SSL_MODE: require
      GITEA__server__DOMAIN: ${GITEA_DOMAIN:-localhost}
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL:-http://localhost:3000}
      GITEA__server__HTTP_PORT: ${GITEA_HTTP_PORT:-3000}
      GITEA__server__SSH_DOMAIN: ${GITEA_DOMAIN:-localhost}
      GITEA__server__SSH_PORT: ${GITEA_SSH_PORT:-2222}
    volumes:
      - ./data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${GITEA_HTTP_PORT:-3000}:3000"
      - "${GITEA_SSH_PORT:-2222}:22"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  data:
