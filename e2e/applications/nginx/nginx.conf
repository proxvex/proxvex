worker_processes auto;
error_log /tmp/nginx-error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Temp paths for rootless operation
    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy;
    fastcgi_temp_path /tmp/fastcgi;
    uwsgi_temp_path /tmp/uwsgi;
    scgi_temp_path /tmp/scgi;

    access_log /tmp/nginx-access.log;

    # Upstream: PostgREST API
    upstream postgrest {
        server {{ POSTGREST_HOST }}:3000;
    }

    # Upstream: Zitadel Identity
    upstream zitadel {
        server {{ ZITADEL_HOST }}:8080;
    }

    # HTTP → redirect to HTTPS
    server {
        listen 8080;
        server_name _;

        location / {
            return 301 https://$host$request_uri;
        }

        # Health check endpoint (no redirect)
        location = /healthz {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }

    # HTTPS reverse proxy
    server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate /certs/fullchain.pem;
        ssl_certificate_key /certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # PostgREST API
        location /api/ {
            proxy_pass http://postgrest/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Zitadel Identity (all other requests)
        location / {
            proxy_pass https://zitadel;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (Zitadel uses gRPC-web)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Increase timeouts for gRPC
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Health check
        location = /healthz {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
