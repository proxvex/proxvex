services:
  gh-runner-proxvex:
    image: ghcr.io/proxvex/github-actions-runner:latest
    restart: unless-stopped
    environment:
      REPO_URL: "https://github.com/proxvex/proxvex"
      ACCESS_TOKEN: "{{ GITHUB_RUNNER_TOKEN }}"
      RUNNER_NAME: "${RUNNER_NAME:-pve1-proxvex}"
      LABELS: "self-hosted,linux,x64,pve1"
      PVETEST_HOST: "${PVETEST_HOST:-ubuntupve}"
      PVETEST_WORKER_HOST: "${PVETEST_WORKER_HOST:-ci-test-worker}"
      PVETEST_WORKER_PORT: "${PVETEST_WORKER_PORT:-22}"
      PVETEST_WORKER_USER: "${PVETEST_WORKER_USER:-root}"
      PVETEST_WOL_MAC: "{{PVETEST_WOL_MAC}}"
      PVETEST_DEPLOYER_PORT: "${PVETEST_DEPLOYER_PORT:-2080}"
      PVETEST_NESTED_SSH_PORT: "${PVETEST_NESTED_SSH_PORT:-2022}"
      PVETEST_NESTED_VMID: "${PVETEST_NESTED_VMID:-9001}"
    volumes:
      - ./config:/etc/proxvex:ro
