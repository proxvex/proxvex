services:
  traefik:
    image: traefik:${DOCKER_traefik_TAG}
    restart: unless-stopped
    command:
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:8080"
      - "--log.level=INFO"
    ports:
      - "8080:8080"
    configs:
      - source: traefik-dynamic-http
        target: /etc/traefik/dynamic.yml
    networks:
      - zitadel

  zitadel-api:
    image: ghcr.io/zitadel/zitadel:${DOCKER_zitadel_TAG}
    restart: unless-stopped
    # Static command. All configuration lives in the YAML files on the
    # `config` managed volume (written pre-start by conf-write-zitadel-yaml),
    # incl. the masterkey file (--masterkeyFile; Zitadel ignores the env/
    # config-key forms under start-from-init). DB password secrets stay as
    # env vars below (normal viper keys, env overrides the absent YAML).
    # After successful bootstrap, 360-post-harden-zitadel rewrites this line
    # to plain `start --config /zitadel/config/zitadel.yaml --config
    # /zitadel/config/zitadel.smtp.yaml --masterkeyFile
    # /zitadel/config/masterkey --tlsMode disabled` and deletes
    # zitadel.init.yaml (FirstInstance migration is not idempotent).
    command: 'start-from-init --config /zitadel/config/zitadel.yaml --config /zitadel/config/zitadel.smtp.yaml --config /zitadel/config/zitadel.init.yaml --masterkeyFile /zitadel/config/masterkey --tlsMode disabled'
    environment:
      # DB password secrets only (normal viper keys — env overrides the
      # absent YAML values and keeps the stack-secret rotation mechanism
      # working via compose-env replacement). The masterkey is NOT here:
      # Zitadel ignores ZITADEL_MASTERKEY env under `start-from-init
      # --config`, so it lives in zitadel.yaml as the top-level Masterkey.
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: "{{ ZITADEL_DB_PASSWORD }}"
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: "{{ POSTGRES_PASSWORD }}"
      # Dependency-runtime value, resolved after the YAML is written, so it
      # is provided here (env overrides YAML) rather than in zitadel.yaml.
      ZITADEL_DATABASE_POSTGRES_HOST: "{{ POSTGRES_HOST }}"
    volumes:
      - /bootstrap:/zitadel/bootstrap
      - /config:/zitadel/config:ro
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 300s
    networks:
      - zitadel

  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:${DOCKER_zitadel_login_TAG}
    restart: unless-stopped
    group_add:
      - "1001"
    environment:
      ZITADEL_API_URL: http://zitadel-api:8080
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      CUSTOM_REQUEST_HEADERS: "Host:{{ ZITADEL_EXTERNALDOMAIN }},X-Forwarded-Proto:{{ ZITADEL_FORWARDED_PROTO }}"
    volumes:
      - /bootstrap:/zitadel/bootstrap:ro
    depends_on:
      zitadel-api:
        condition: service_healthy
    networks:
      - zitadel

configs:
  traefik-dynamic-http:
    content: |
      http:
        middlewares:
          zitadel-host:
            headers:
              customRequestHeaders:
                Host: "{{ ZITADEL_EXTERNALDOMAIN }}"
        routers:
          zitadel-login:
            rule: "PathPrefix(`/ui/v2/login`)"
            service: zitadel-login
            priority: 250
            entryPoints:
              - web
          zitadel-api:
            rule: "PathPrefix(`/`)"
            service: zitadel-api
            middlewares:
              - zitadel-host
            priority: 100
            entryPoints:
              - web
        services:
          zitadel-api:
            loadBalancer:
              servers:
                - url: "h2c://zitadel-api:8080"
          zitadel-login:
            loadBalancer:
              servers:
                - url: "http://zitadel-login:3000"
  traefik-dynamic-https:
    content: |
      tls:
        certificates:
          - certFile: /certs/fullchain.pem
            keyFile: /certs/privkey.pem
      http:
        middlewares:
          zitadel-host:
            headers:
              customRequestHeaders:
                Host: "{{ ZITADEL_EXTERNALDOMAIN }}"
        routers:
          zitadel-login:
            rule: "PathPrefix(`/ui/v2/login`)"
            service: zitadel-login
            priority: 250
            entryPoints:
              - websecure
            tls: {}
          zitadel-api:
            rule: "PathPrefix(`/`)"
            service: zitadel-api
            middlewares:
              - zitadel-host
            priority: 100
            entryPoints:
              - websecure
            tls: {}
        services:
          zitadel-api:
            loadBalancer:
              servers:
                - url: "h2c://zitadel-api:8080"
          zitadel-login:
            loadBalancer:
              servers:
                - url: "http://zitadel-login:3000"

networks:
  zitadel:
